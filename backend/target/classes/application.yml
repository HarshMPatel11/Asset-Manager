## ============================================
## ASSET MANAGER - Spring Boot Configuration
## ============================================

spring:
  application:
    name: asset-manager-api
    version: 1.0.0

  # ========== SERVER CONFIG ==========
  server:
    port: 8080
    servlet:
      context-path: /api

  # ========== DATABASE CONFIG ==========
  datasource:
    url: jdbc:h2:mem:asset_manager_${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password: 
    driver-class-name: org.h2.Driver

    # Connection Pool Configuration
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true

  # ========== H2 CONSOLE (FOR DEBUGGING) ==========
  h2:
    console:
      enabled: true
      path: /h2-console

  # ========== JPA/HIBERNATE CONFIG ==========
  jpa:
    hibernate:
      ddl-auto: create-drop  # Drop and recreate schema on each run
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false  # Set to true only for debugging
    open-in-view: false  # IMPORTANT: False prevents lazy loading issues

  # ========== JACKSON CONFIG ==========
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # ========== SECURITY CONFIG ==========
  security:
    user:
      name: admin
      password: admin123

  # ========== MVC CONFIG ==========
  mvc:
    throw-exception-if-no-handler-found: true
    log-resolved-exception: true

  # ========== WEB CONFIG ==========
  web:
    resources:
      add-mappings: false

  # ========== ACTUATOR CONFIG ==========
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics
    endpoint:
      health:
        show-details: when-authorized

# ============================================
# LOGGING CONFIGURATION
# ============================================

logging:
  level:
    root: INFO
    com.assetmanager: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  
  file:
    name: logs/asset-manager.log
    max-size: 10MB
    max-history: 30

# ============================================
# APPLICATION CUSTOM PROPERTIES
# ============================================

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-change-in-production-min-32-chars}
    expiration: 86400000  # 24 hours in milliseconds
    refresh-expiration: 604800000  # 7 days in milliseconds
  
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
  
  security:
    # Password requirements
    password-min-length: 8
    password-require-uppercase: true
    password-require-lowercase: true
    password-require-digits: true
    password-require-special: true

  # Transaction limits
  transaction:
    daily-withdraw-limit: 100000.00
    daily-transfer-limit: 500000.00
    max-transfer-amount: 100000.00
    min-transfer-amount: 1.00
  
  # Account settings
  account:
    initial-balance: 0.00
    account-number-prefix: ACC

  # Email settings (if using)
  # email:
  #   enabled: false
  #   smtp-server: smtp.gmail.com
  #   smtp-port: 587
  #   from-address: noreply@assetmanager.com
  #   from-name: Asset Manager
  #   use-tls: true
  #   username: ${EMAIL_USERNAME}
  #   password: ${EMAIL_PASSWORD}

  # Monitoring
  monitoring:
    enabled: true
    log-requests: true
    log-responses: true

---
## ============================================
## DEVELOPMENT PROFILE
## ============================================

spring:
  config:
    activate:
      on-profile: dev
  
  jpa:
    hibernate:
      ddl-auto: update  # Auto-create/update schema
    show-sql: true
  
  h2:
    console:
      enabled: true

logging:
  level:
    root: DEBUG
    com.assetmanager: DEBUG
    org.springframework: DEBUG

---
## ============================================
## PRODUCTION PROFILE
## ============================================

spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: ${DB_URL:jdbc:mysql://prod-db:3306/asset_manager}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  
  jpa:
    hibernate:
      ddl-auto: validate  # NEVER auto-update in production
    show-sql: false

logging:
  level:
    root: WARN
    com.assetmanager: INFO
  file:
    name: /var/log/asset-manager/app.log
    max-size: 100MB
    max-history: 90

---
## ============================================
## TESTING PROFILE
## ============================================

spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

logging:
  level:
    root: WARN
    com.assetmanager: DEBUG
